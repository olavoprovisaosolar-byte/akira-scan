<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="AkiraScan — leia mangás online com interface premium, favoritos, histórico e catálogo.">
    <meta name="theme-color" content="#060608">
    <meta name="application-name" content="AkiraScan">
    <meta property="og:site_name" content="AkiraScan">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23060608'/%3E%3Ctext x='32' y='42' text-anchor='middle' font-size='28' font-family='system-ui,sans-serif' fill='%23e8e8ec'%3EA%3C/text%3E%3C/svg%3E">
    <title>AkiraScan — Leia Mangás Online</title>
    <link rel="stylesheet" href="css/akira.css">
    <link rel="preload" href="data/catalogo-index.json" as="fetch" crossorigin>
</head>
<body class="akira-app">
    <div id="header-slot"></div>
    <div id="aviso-servidor"></div>

    <main class="container">
        <section id="hero-section" aria-label="Destaque principal">
            <div id="hero-planet-slot"></div>
            <div class="hero-carousel" id="hero-carousel" aria-label="Destaques">
                <div class="hero-carousel-track" id="hero-track"></div>
                <div class="hero-carousel-dots" id="hero-dots"></div>
                <button type="button" class="hero-carousel-btn prev" id="hero-prev" aria-label="Anterior">‹</button>
                <button type="button" class="hero-carousel-btn next" id="hero-next" aria-label="Próximo">›</button>
            </div>
        </section>

        <section id="categories-section" aria-label="Categorias e catálogo">
            <section class="secao-akira" id="continuar">
                <div class="secao-header"><h2>▶ Continuar lendo</h2></div>
                <div class="row-continuar" id="sec-continuar">
                    <p class="msg-vazia">Ainda não leste nenhum capítulo.</p>
                </div>
            </section>

            <div id="category-grids"></div>

            <section class="secao-akira">
                <div class="secao-header">
                    <h2>Recém-lançados</h2>
                    <a href="biblioteca.html?sort=recentes">Ver todos</a>
                </div>
                <div class="lista-caps-recentes" id="sec-recentes"></div>
            </section>

            <div class="home-grid-duo">
                <section class="secao-akira">
                    <div class="secao-header">
                        <h2>Ranking semanal</h2>
                        <a href="biblioteca.html?sort=popular">Ver ranking</a>
                    </div>
                    <div class="ranking-list" id="sec-ranking"></div>
                </section>
                <section class="secao-akira">
                    <div class="secao-header">
                        <h2>Novidades</h2>
                        <a href="biblioteca.html?sort=recentes">Ver mais</a>
                    </div>
                    <div class="grid-mangas grid-mangas-compact" id="sec-novidades"></div>
                </section>
            </div>

            <section class="secao-akira">
                <div class="secao-header">
                    <h2>Populares</h2>
                    <a href="biblioteca.html?sort=popular">Ver todos</a>
                </div>
                <div class="grid-mangas" id="sec-populares"></div>
            </section>

            <section class="secao-akira">
                <div class="secao-header"><h2>Gêneros</h2></div>
                <div class="genre-list" id="sec-generos"></div>
            </section>
        </section>

        <section id="details-section" hidden aria-label="Detalhes do mangá">
            <div id="details-root"></div>
        </section>

        <section id="reader-section" hidden aria-label="Leitor">
            <p class="msg-vazia">A redirecionar para o leitor…</p>
        </section>
    </main>

    <div id="footer-slot"></div>

    <script type="module">
        import { renderHeader, renderFooter, initShell } from "./js/app-shell.js";
        import { initHomePage } from "./js/pages/home-page.js";

        const errSlot = document.createElement("div");
        errSlot.id = "boot-error";
        errSlot.className = "aviso-servidor escondido";
        document.body.prepend(errSlot);

        try {
            document.getElementById("header-slot").innerHTML = renderHeader();
            document.getElementById("footer-slot").innerHTML = renderFooter();
            await initShell();
            await initHomePage();
        } catch (err) {
            console.error("[Boot]", err);
            errSlot.classList.remove("escondido");
            errSlot.innerHTML = `<h2>Erro ao iniciar</h2><p>${err?.message || err}</p><p>Use <a href="http://localhost:5501/">http://localhost:5501</a> com o servidor local (<code>npm run dev:legacy</code>).</p>`;
        }
    </script>
</body>
</html>
