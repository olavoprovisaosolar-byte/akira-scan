# Referência — copie para .github/workflows/ na raiz se necessário.
# Workflow ativo: ../../.github/workflows/nexustoons-update-chapters.yml

name: NexusToons Update Chapters

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nexustoons-bot
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Probe NexusToons
        run: npm run bot:nexustoons:probe
        continue-on-error: true

      - name: Probe Telegra.ph upload
        run: npm run bot:nexustoons:telegra-probe
        continue-on-error: true

      - name: Run NexusToons bot
        env:
          NEXUSTOONS_USE_PLAYWRIGHT: "1"
          NEXUSTOONS_HOSTING_ADAPTER: "telegra"
          TELEGRA_DELAY_MS: "600"
        run: npm run bot:nexustoons

      - name: Commit manifest + catalog updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/nexustoons/manifest.json data/catalogo.json data/catalogo-index.json data/cloud/chapters-index.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "bot(nexustoons): sync caps telegra $(date -u +%Y-%m-%dT%H:%MZ)"
          git push || true
