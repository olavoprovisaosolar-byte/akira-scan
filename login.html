<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Login — AkiraScan</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23060608'/%3E%3Ctext x='32' y='42' text-anchor='middle' font-size='28' font-family='system-ui,sans-serif' fill='%23e8e8ec'%3EA%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="css/akira.css">
</head>
<body class="auth-page">
    <div class="auth-box">
        <h2 id="titulo-form"><span>BEM-VINDO</span> DE VOLTA!</h2>

        <div class="auth-tabs" role="tablist">
            <button type="button" class="auth-tab ativa" data-modo="entrar">ENTRAR</button>
            <button type="button" class="auth-tab" data-modo="registar">CRIAR CONTA</button>
        </div>

        <form id="form-auth">
            <div class="auth-field">
                <label for="auth-email">E-MAIL</label>
                <input type="email" id="auth-email" placeholder="Digite seu e-mail" required autocomplete="email">
            </div>
            <div class="auth-field">
                <label for="auth-senha">SENHA</label>
                <input type="password" id="auth-senha" placeholder="Mínimo 6 caracteres" required minlength="6" autocomplete="current-password">
            </div>
            <div class="auth-field escondido" id="grupo-confirmar">
                <label for="auth-confirmar">CONFIRMAR SENHA</label>
                <input type="password" id="auth-confirmar" placeholder="Repita a senha" autocomplete="new-password">
            </div>
            <button type="submit" class="auth-submit" id="btn-acao">ENTRAR</button>
        </form>

        <div id="msg" class="auth-mensagem"></div>

        <p class="auth-info">Favoritos e histórico sincronizam na nuvem quando entras com e-mail e senha.</p>

        <button type="button" class="auth-demo escondido" id="btn-demo">Experimentar (offline)</button>

        <a href="index.html" class="auth-voltar">← Voltar ao início</a>
    </div>

    <script type="module">
        import {
            entrarComEmail,
            registarComEmail,
            observarAuth,
            prepararContaDemo
        } from "./js/auth.js";
        import { criarHistoricoDemonstracao } from "./js/storage.js";

        let modo = "entrar";
        const form = document.getElementById("form-auth");
        const btnAcao = document.getElementById("btn-acao");
        const tituloForm = document.getElementById("titulo-form");
        const grupoConfirmar = document.getElementById("grupo-confirmar");
        const msgEl = document.getElementById("msg");
        const btnDemo = document.getElementById("btn-demo");

        async function ativarContaDemo(mostrarSucesso) {
            const resultado = await prepararContaDemo();
            if (!resultado.ok) {
                mostrarMsg(resultado.mensagem, "erro");
                return;
            }
            criarHistoricoDemonstracao();
            if (mostrarSucesso) {
                mostrarMsg("Conta demo ativa! A redirecionar...", "sucesso");
            }
        }

        function mostrarMsg(texto, tipo) {
            msgEl.textContent = texto;
            msgEl.className = `auth-mensagem ${tipo}`;
        }

        function limparMsg() {
            msgEl.className = "auth-mensagem";
            msgEl.textContent = "";
        }

        function definirModo(novoModo) {
            modo = novoModo;
            document.querySelectorAll(".auth-tab").forEach((aba) => {
                aba.classList.toggle("ativa", aba.dataset.modo === modo);
            });

            if (modo === "registar") {
                tituloForm.innerHTML = "<span>CRIAR</span> A TUA CONTA";
                btnAcao.textContent = "REGISTAR";
                grupoConfirmar.classList.remove("escondido");
            } else {
                tituloForm.innerHTML = "<span>BEM-VINDO</span> DE VOLTA!";
                btnAcao.textContent = "ENTRAR";
                grupoConfirmar.classList.add("escondido");
            }
            limparMsg();
        }

        document.querySelectorAll(".auth-tab").forEach((aba) => {
            aba.addEventListener("click", () => definirModo(aba.dataset.modo));
        });

        btnDemo.classList.remove("escondido");
        btnDemo.addEventListener("click", () => ativarContaDemo(true));

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            limparMsg();

            const email = document.getElementById("auth-email").value.trim();
            const senha = document.getElementById("auth-senha").value;
            const confirmar = document.getElementById("auth-confirmar").value;

            if (!email || !senha) {
                mostrarMsg("Preenche o e-mail e a senha.", "erro");
                return;
            }

            if (modo === "registar" && senha !== confirmar) {
                mostrarMsg("As senhas não coincidem.", "erro");
                return;
            }

            btnAcao.disabled = true;
            btnAcao.textContent = modo === "registar" ? "A REGISTAR..." : "A ENTRAR...";

            const resultado = modo === "registar"
                ? await registarComEmail(email, senha)
                : await entrarComEmail(email, senha);

            btnAcao.disabled = false;
            btnAcao.textContent = modo === "registar" ? "REGISTAR" : "ENTRAR";

            if (!resultado.ok) {
                mostrarMsg(resultado.mensagem, "erro");
                return;
            }

            if (resultado.novo) {
                mostrarMsg("Conta criada com sucesso! A redirecionar...", "sucesso");
            }
        });

        observarAuth((user) => {
            if (user) {
                window.location.href = "biblioteca.html";
            }
        });
    </script>
</body>
</html>
