name: NexusToons Update Chapters

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nexustoons-bot
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Probe NexusToons
        run: npm run bot:nexustoons:probe
        continue-on-error: true

      - name: Run NexusToons bot
        env:
          NEXUSTOONS_USE_PLAYWRIGHT: "1"
          HOSTING_ADAPTER: catbox
          NEXUSTOONS_HOSTING_ADAPTER: catbox
          CATBOX_STATIC_FALLBACK: "false"
          AKIRA_PUBLISH_TOKEN: ${{ secrets.AKIRA_PUBLISH_TOKEN }}
          AKIRA_PUBLISH_BASE_URL: https://akira-scan.pages.dev
          AKIRA_SCAN_BASE_URL: https://akira-scan.pages.dev
          CATBOX_DELAY_MS: "800"
        run: npm run bot:nexustoons

      - name: Commit state + catalog updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/nexustoons/state.json data/nexustoons/manifest.json data/catalogo.json data/catalogo-index.json data/cloud/chapters-index.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "bot(nexustoons): sync caps catbox $(date -u +%Y-%m-%dT%H:%MZ)"
          git push || true
