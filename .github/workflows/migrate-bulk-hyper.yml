name: Migrate Bulk Hyper (Cloud)

# Migração bulk hyper/ultra na nuvem — Telegra.ph primário, fallback cloud-static.
# Retoma de data/nexustoons/state.json; commits periódicos de checkpoint.

on:
  workflow_dispatch:
    inputs:
      slug:
        description: "Slug NexusToons (vazio = todos os mangás pendentes)"
        required: false
        type: string
      mode:
        description: "Modo de velocidade"
        required: true
        type: choice
        default: hyper
        options:
          - hyper
          - ultra
      deploy:
        description: "Deploy Cloudflare Pages ao final"
        required: true
        type: boolean
        default: false
      sync_interval_minutes:
        description: "Intervalo de commit checkpoint git (minutos, não pausa upload)"
        required: false
        default: "120"
      manga_parallel:
        description: "Mangás paralelos (hyper=3; use 2 se OOM no runner)"
        required: false
        default: "3"
      all_chapters:
        description: "Importar todos os caps pendentes (não só o último)"
        required: false
        default: "false"
      sync_only_new:
        description: "Só caps novos — latest-only por mangá (rápido)"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: migrate-bulk-hyper
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Show checkpoint state
        run: |
          if [ -f data/nexustoons/state.json ]; then
            COUNT=$(node -e "const s=require('./data/nexustoons/state.json'); console.log(Object.keys(s.processed||{}).length)")
            echo "Caps já processados no state.json: $COUNT"
          else
            echo "state.json ausente — migração do zero"
          fi

      - name: Run cloud hyper migration
        env:
          SYNC_INTERVAL_MINUTES: ${{ inputs.sync_interval_minutes }}
          MIGRATE_LOOP: "1"
          MIGRATE_LOOP_MAX_MS: "21000000"
          NEXUSTOONS_MANGA_PARALLEL: ${{ inputs.manga_parallel }}
          NEXUSTOONS_ALL_CHAPTERS: ${{ inputs.all_chapters == 'true' && '1' || '0' }}
          NEXUSTOONS_SYNC_ONLY_NEW: ${{ inputs.sync_only_new == 'true' && '1' || '0' }}
          NEXUSTOONS_USE_PLAYWRIGHT: "1"
          TELEGRA_SKIP: "0"
          HOSTING_ADAPTER: telegra
          NEXUSTOONS_HOSTING_ADAPTER: telegra
          TELEGRA_STATIC_FALLBACK: "true"
          TELEGRA_DELAY_MS: "600"
          TELEGRA_RETRIES: "3"
          STREAM_PAGE_CONCURRENCY: "2"
          PAGE_DOWNLOAD_CONCURRENCY: "2"
          NEXUSTOONS_PURGE_LOCAL: "1"
          CF_PAGES_PROJECT: akira-scan
          CF_PAGES_BRANCH: main
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          AKIRA_PUBLISH_TOKEN: ${{ secrets.AKIRA_PUBLISH_TOKEN }}
          AKIRA_PUBLISH_BASE_URL: https://akira-scan.pages.dev
          AKIRA_SCAN_BASE_URL: https://akira-scan.pages.dev
        run: |
          ARGS=(--${{ inputs.mode }})
          if [ -n "${{ inputs.slug }}" ]; then
            ARGS+=(--slug="${{ inputs.slug }}")
          else
            ARGS+=(--all)
          fi
          if [ "${{ inputs.deploy }}" != "true" ]; then
            ARGS+=(--no-deploy)
          fi
          node scripts/cloud-hyper-run.mjs "${ARGS[@]}"

      - name: Retrigger se ainda houver pendências
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if node scripts/check-migrate-pending.mjs; then
            echo "Ainda há mangás pendentes — re-disparando workflow em 30s…"
            sleep 30
            gh workflow run migrate-bulk-hyper.yml \
              --ref main \
              -f mode=${{ inputs.mode }} \
              -f deploy=false \
              -f all_chapters=true \
              -f sync_interval_minutes=${{ inputs.sync_interval_minutes }} \
              -f manga_parallel=${{ inputs.manga_parallel }}
          else
            echo "Fila vazia — migração completa."
          fi

      - name: Upload migration log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-log-${{ github.run_id }}
          path: logs/migration-*.log
          if-no-files-found: ignore
          retention-days: 14
